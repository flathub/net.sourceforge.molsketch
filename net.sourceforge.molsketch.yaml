app-id: net.sourceforge.molsketch
runtime: org.kde.Sdk
sdk: org.kde.Sdk
runtime-version: 5.15-25.08
command: molsketch
rename-icon: molsketch
rename-desktop-file: molsketch.desktop
finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --share=network
modules:
  - name: rapidjson
    buildsystem: cmake
    config-opts:
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DRAPIDJSON_BUILD_DOC=OFF
      - -DRAPIDJSON_BUILD_EXAMPLES=OFF
      - -DRAPIDJSON_BUILD_TESTS=OFF
    sources:
      - type: archive
        url: https://github.com/Tencent/rapidjson/archive/v1.1.0.tar.gz
        sha256: bf7ced29704a1e696fbccf2a2b4ea068e7774fa37f6d7dd4039d0787f8bed98e
        x-checker-data:
          type: anitya
          project-id: 7422
          stable-only: true
          url-template: https://github.com/Tencent/rapidjson/archive/v${version}.tar.gz
      - type: patch
        path: Removed_non-compiling_assignment_operator.patch

  - name: OpenBabel
    buildsystem: cmake
    builddir: true
    config-opts:
      - -DBUILD_GUI=FALSE
      - -DENABLE_TESTS=OFF
    sources:
      - type: archive
        url: https://github.com/openbabel/openbabel/archive/refs/tags/openbabel-3-2-0.tar.gz
        sha256: 9aadf9f01b3d0ff15d49fcd28d7d76b923218d70bf10f99ea4cc466607f4c7e2
        x-checker-data:
          type: anitya
          project-id: 2539
          stable-only: true
          url-template: https://github.com/openbabel/openbabel/archive/refs/tags/openbabel-${version}.tar.gz


  - name: Molsketch
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_INSTALL_PREFIX:PATH=/app
      - -DMSK_PREFIX=/app
      - -DMSK_INSTALL_LIBS=/lib
    sources:
      - type: archive
        url: https://sourceforge.net/projects/molsketch/files/Molsketch/Molsketch-0.8.4-src.tar.gz
        sha256: a5ff8a4352a547da6b01add3cf46c3d926afac1b455aa8effc08beba7c2da2c1
        x-checker-data:
          type: anitya
          project-id: 15739
          stable-only: true
          url-template: https://sourceforge.net/projects/molsketch/files/Molsketch/Molsketch-$version-src.tar.gz
      - type: patch
        path: add_dev_name.patch
